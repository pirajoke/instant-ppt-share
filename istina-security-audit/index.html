<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Istina.co Security Audit - Findings and Actions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #080908;
        --dark: #111412;
        --line: rgba(255, 255, 255, 0.12);
        --white: #f5f2ea;
        --muted: #a49f97;
        --dim: #6d6962;
        --orange: #ff6b2b;
        --green: #79d6a4;
        --cyan: #70d7e8;
        --blue: #7aa8ff;
        --heading: "Space Grotesk", sans-serif;
        --body: "Inter", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--black);
        color: var(--white);
        font-family: var(--body);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(circle at 50% 42%, black 0%, transparent 74%);
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 16% 18%, rgba(255, 107, 43, 0.18), transparent 28%),
          radial-gradient(circle at 84% 72%, rgba(112, 215, 232, 0.12), transparent 32%),
          radial-gradient(circle at 58% 8%, rgba(121, 214, 164, 0.08), transparent 26%);
        pointer-events: none;
      }

      .progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        width: 16.66%;
        background: linear-gradient(90deg, var(--orange), #f1bd58);
        z-index: 20;
        transition: width 0.25s ease;
      }

      header {
        position: fixed;
        inset: 0 0 auto;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 28px 44px;
        pointer-events: none;
      }

      .brand,
      .actions {
        display: flex;
        align-items: center;
        gap: 14px;
        pointer-events: all;
      }

      .brand b {
        color: var(--cyan);
        font-family: var(--heading);
        font-size: 13px;
        letter-spacing: 1.8px;
      }

      .brand span {
        color: var(--dim);
        font-size: 13px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 9px 14px;
        border: 1px solid rgba(255, 107, 43, 0.42);
        border-radius: 10px;
        color: var(--orange);
        font-family: var(--heading);
        font-size: 13px;
        text-decoration: none;
      }

      .button.secondary {
        border-color: rgba(121, 214, 164, 0.36);
        color: var(--green);
      }

      main {
        position: relative;
        z-index: 5;
        width: 100%;
        min-height: 100vh;
      }

      .slide {
        display: none;
        min-height: 100vh;
        padding: 92px clamp(20px, 4vw, 86px) 86px;
        place-items: center;
      }

      .slide.active {
        display: grid;
      }

      .stage {
        width: min(1480px, 100%);
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: clamp(18px, 3vw, 42px);
        align-items: center;
      }

      .slide-rail {
        min-height: min(70vh, 760px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 10px 0;
      }

      .rail-number {
        color: var(--orange);
        font-family: var(--heading);
        font-size: clamp(34px, 4vw, 62px);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
      }

      .rail-label {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        color: var(--dim);
        font-family: var(--heading);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .frame {
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        background: #050505;
        box-shadow: 0 34px 110px rgba(0, 0, 0, 0.48);
        width: 100%;
        aspect-ratio: 16 / 9;
      }

      .frame img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .nav {
        position: fixed;
        left: 50%;
        bottom: 32px;
        z-index: 30;
        display: flex;
        gap: 10px;
        transform: translateX(-50%);
      }

      .dot {
        width: 9px;
        height: 9px;
        border: 1px solid var(--dim);
        border-radius: 50%;
        background: transparent;
        cursor: pointer;
      }

      .dot.active {
        background: var(--orange);
        border-color: var(--orange);
        transform: scale(1.35);
      }

      .arrows {
        position: fixed;
        right: 44px;
        bottom: 22px;
        z-index: 30;
        display: flex;
        gap: 8px;
      }

      .arrow {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 107, 43, 0.35);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
      }

      .counter {
        position: fixed;
        left: 44px;
        bottom: 34px;
        z-index: 30;
        color: var(--dim);
        font-family: var(--heading);
        font-size: 13px;
        letter-spacing: 2px;
      }

      .counter b {
        color: var(--orange);
      }

      @media (max-width: 900px) {
        header {
          position: static;
          flex-direction: column;
          padding: 18px;
        }

        .slide {
          min-height: auto;
          padding: 18px 18px 92px;
        }

        .stage {
          grid-template-columns: 1fr;
          gap: 16px;
        }

        .slide-rail {
          min-height: auto;
          flex-direction: row;
          align-items: center;
          padding: 0;
        }

        .rail-number {
          font-size: 26px;
        }

        .rail-label {
          writing-mode: horizontal-tb;
          transform: none;
        }

        .nav {
          display: none;
        }

        .counter {
          left: 18px;
        }

        .arrows {
          right: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="progress" id="progress"></div>
    <header>
      <div class="brand"><b>ISTINA.CO</b><span>Security audit: findings and actions</span></div>
      <div class="actions">
        <a class="button secondary" href="scratch/previews/montage.png?v=20260518gh1">Preview</a>
        <a class="button" href="output/output.pptx?v=20260518gh1">Download PPTX</a>
      </div>
    </header>

    <main>
      <section class="slide active">
        <div class="stage">
          <div class="slide-rail"><div class="rail-number">01</div><div class="rail-label">Verdict</div></div>
          <div class="frame"><img src="scratch/previews/slide-01.png?v=20260518gh1" alt="Slide 01" decoding="async" /></div>
        </div>
      </section>

      <section class="slide">
        <div class="stage">
          <div class="slide-rail"><div class="rail-number">02</div><div class="rail-label">Confirmed</div></div>
          <div class="frame"><img src="scratch/previews/slide-02.png?v=20260518gh1" alt="Slide 02" decoding="async" /></div>
        </div>
      </section>

      <section class="slide">
        <div class="stage">
          <div class="slide-rail"><div class="rail-number">03</div><div class="rail-label">Problems</div></div>
          <div class="frame"><img src="scratch/previews/slide-03.png?v=20260518gh1" alt="Slide 03" decoding="async" /></div>
        </div>
      </section>

      <section class="slide">
        <div class="stage">
          <div class="slide-rail"><div class="rail-number">04</div><div class="rail-label">Fix order</div></div>
          <div class="frame"><img src="scratch/previews/slide-04.png?v=20260518gh1" alt="Slide 04" decoding="async" /></div>
        </div>
      </section>

      <section class="slide">
        <div class="stage">
          <div class="slide-rail"><div class="rail-number">05</div><div class="rail-label">Validation</div></div>
          <div class="frame"><img src="scratch/previews/slide-05.png?v=20260518gh1" alt="Slide 05" decoding="async" /></div>
        </div>
      </section>

      <section class="slide">
        <div class="stage">
          <div class="slide-rail"><div class="rail-number">06</div><div class="rail-label">Done criteria</div></div>
          <div class="frame"><img src="scratch/previews/slide-06.png?v=20260518gh1" alt="Slide 06" decoding="async" /></div>
        </div>
      </section>
    </main>

    <div class="counter"><b id="current">01</b> / 06</div>
    <div class="nav" id="nav"></div>
    <div class="arrows">
      <button class="arrow" id="prev" aria-label="Previous slide">&larr;</button>
      <button class="arrow" id="next" aria-label="Next slide">&rarr;</button>
    </div>

    <script>
      const slides = [...document.querySelectorAll(".slide")];
      const nav = document.getElementById("nav");
      const current = document.getElementById("current");
      const progress = document.getElementById("progress");
      let index = 0;

      slides.forEach((_, i) => {
        const dot = document.createElement("button");
        dot.className = "dot" + (i === 0 ? " active" : "");
        dot.addEventListener("click", () => go(i));
        nav.appendChild(dot);
      });

      function go(next) {
        if (next < 0 || next >= slides.length) return;
        slides[index].classList.remove("active");
        index = next;
        slides[index].classList.add("active");
        current.textContent = String(index + 1).padStart(2, "0");
        progress.style.width = `${((index + 1) / slides.length) * 100}%`;
        [...nav.children].forEach((dot, i) => dot.classList.toggle("active", i === index));
        history.replaceState(null, "", `#slide-${index + 1}`);
      }

      document.getElementById("next").addEventListener("click", () => go(index + 1));
      document.getElementById("prev").addEventListener("click", () => go(index - 1));
      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight" || event.key === " ") go(index + 1);
        if (event.key === "ArrowLeft") go(index - 1);
      });

      const match = location.hash.match(/^#slide-(\d+)$/);
      if (match) go(Math.max(0, Math.min(slides.length - 1, Number(match[1]) - 1)));
    </script>
  </body>
</html>
